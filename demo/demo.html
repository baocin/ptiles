<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PTILES Building Lookup Demo</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: #0d0d14; color: #d0d0d8;
    display: flex; flex-direction: column; align-items: center;
    min-height: 100vh; padding: 40px 20px;
  }
  h1 { font-size: 24px; font-weight: 600; margin-bottom: 8px; color: #fff; }
  p { color: #777; font-size: 14px; margin-bottom: 32px; max-width: 600px; text-align: center; }
  .demo-box {
    background: #151520; border-radius: 16px; padding: 32px;
    width: 100%; max-width: 700px;
    border: 1px solid #222;
  }
  .row { display: flex; gap: 12px; margin-bottom: 16px; flex-wrap: wrap; }
  .row label { display: flex; flex-direction: column; flex: 1; min-width: 200px; }
  .row label span { font-size: 11px; text-transform: uppercase; letter-spacing: 0.5px; color: #666; margin-bottom: 4px; }
  input, select {
    background: #0d0d14; border: 1px solid #333; border-radius: 8px;
    padding: 10px 14px; color: #d0d0d8; font-size: 14px;
    font-family: 'SF Mono', 'Fira Code', monospace;
    width: 100%; outline: none; transition: border-color 0.2s;
  }
  input:focus, select:focus { border-color: #556; }
  button {
    background: #2a2a3a; color: #d0d0d8; border: 1px solid #444;
    border-radius: 8px; padding: 10px 24px; font-size: 14px;
    cursor: pointer; transition: background 0.2s;
    width: 100%; margin-top: 8px;
  }
  button:hover { background: #3a3a4a; }
  button:disabled { opacity: 0.4; cursor: not-allowed; }
  #result {
    margin-top: 20px; min-height: 80px;
    background: #0d0d14; border-radius: 10px; padding: 20px;
    font-size: 13px; line-height: 1.6;
    border: 1px solid #222;
    transition: opacity 0.3s;
  }
  #result.loading { opacity: 0.5; }
  #result .label { color: #666; }
  #result .val { color: #d0d0d8; margin-left: 8px; }
  #result .err { color: #e55; }
  #result .building-name { font-size: 20px; font-weight: 600; color: #fff; margin-bottom: 4px; }
  #result .building-type { color: #888; font-size: 12px; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 16px; }
  #result .row { display: flex; justify-content: space-between; padding: 4px 0; border-bottom: 1px solid #1a1a28; }
  #result .row:last-child { border-bottom: none; }
  .coords-preview {
    font-size: 11px; color: #555; font-family: 'SF Mono', 'Fira Code', monospace;
    margin-top: 8px; word-break: break-all; max-height: 120px; overflow-y: auto;
  }
  .badge {
    display: inline-block; padding: 2px 10px; border-radius: 20px;
    font-size: 11px; font-weight: 500; margin-top: 8px;
  }
  .badge.found { background: #1a3a2a; color: #5d8; }
  .badge.null { background: #2a1a1a; color: #d55; }
  .status-bar {
    font-size: 12px; color: #555; text-align: center;
    margin-top: 24px; padding: 12px; border-top: 1px solid #1a1a28;
  }
  select option { background: #151520; color: #d0d0d8; }
</style>
</head>
<body>
<h1>PTILES Building Lookup</h1>
<p>Click a preset or enter coordinates. Fetches a <b>buildings_v8.ptiles</b> file from<br>
  <code style="color:#888">https://maps.mydatatimeline.com/maps/</code><br>
  and finds the nearest building at that GPS point.</p>

<div class="demo-box">
  <div class="row">
    <label>
      <span>State</span>
      <select id="state">
        <option value="TN">Tennessee</option>
        <option value="CA">California</option>
        <option value="NY">New York</option>
        <option value="FL">Florida</option>
        <option value="TX">Texas</option>
        <option value="IL">Illinois</option>
        <option value="WA">Washington</option>
        <option value="CO">Colorado</option>
        <option value="DC">District of Columbia</option>
        <option value="HI">Hawaii</option>
      </select>
    </label>
    <label>
      <span>Preset location</span>
      <select id="preset">
        <option value="36.1604,-86.7800">Nashville — The Place</option>
        <option value="40.7484,-73.9856">NYC — Empire State Building</option>
        <option value="34.0522,-118.2437">Los Angeles — Downtown</option>
        <option value="41.8827,-87.6233">Chicago — Loop</option>
        <option value="38.9072,-77.0369">Washington DC — White House</option>
        <option value="47.6062,-122.3321">Seattle — Downtown</option>
        <option value="25.7617,-80.1918">Miami — Downtown</option>
        <option value="29.7604,-95.3698">Houston — Downtown</option>
        <option value="39.7392,-104.9903">Denver — Downtown</option>
        <option value="21.3069,-157.8583">Honolulu — Downtown</option>
      </select>
    </label>
  </div>
  <div class="row">
    <label>
      <span>Latitude</span>
      <input type="text" id="lat" value="36.1604">
    </label>
    <label>
      <span>Longitude</span>
      <input type="text" id="lon" value="-86.7800">
    </label>
  </div>
  <button id="go">Look up building</button>

  <div id="result" class="loading">Click "Look up building" to start.</div>

  <div class="status-bar" id="status">Ready</div>
</div>

<script src="https://unpkg.com/h3-js@4.2.0/dist/h3-js.umd.js"></script>
<script src="https://unpkg.com/@bokuweb/zstd-wasm@1.5.0/dist/umd/index.js"></script>
<script>
let zstdInit = ZSTD.init();

async function zstdDecompress(data, dict) {
  await zstdInit;
  return ZSTD.decompressUsingDict(new Uint8Array(data), new Uint8Array(dict));
}

// ─── Binary helpers ───────────────────────────────────────────────

function u32(v, o) { return v.getUint32(o, true); }
function u64(v, o) { return v.getUint32(o, true) + v.getUint32(o + 4, true) * 0x100000000; }
function f32(v, o) { return v.getFloat32(o, true); }
function u16(v, o) { return v.getUint16(o, true); }
function i16(v, o) { return v.getInt16(o, true); }

function readPacked(data, off, len) {
  let r = 0;
  for (let i = 0; i < len; i++) r |= data[off + i] << (i * 8);
  return r;
}

function decodeVarint(data, start) {
  let r = 0n, s = 0n, p = start;
  while (p < data.length) {
    const b = data[p++];
    r |= BigInt(b & 0x7f) << s;
    if ((b & 0x80) === 0) break;
    s += 7n;
  }
  return { value: r, consumed: p - start };
}

function zigzagI32(n) {
  const v = Number(n & 0xffffffffn);
  return (v >>> 1) ^ -(v & 1);
}

// ─── PTILES reader ────────────────────────────────────────────────

class PtilesDemoReader {
  constructor(data, header, entries, cellMap, dict) {
    this.data = data;
    this.header = header;
    this.entries = entries;
    this.cellMap = cellMap;
    this.dict = dict;
    this.relOff = entries.length > 0 && entries[0].blockOffset < header.blocksOffset;
  }

  static async fromUrl(url) {
    const resp = await fetch(url);
    if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
    const buf = new Uint8Array(await resp.arrayBuffer());
    const dv = new DataView(buf.buffer, buf.byteOffset, 256);

    const h = {
      format: String.fromCharCode(buf[6]),
      version: dv.getUint8(8),
      minLat: f32(dv, 12), minLon: f32(dv, 16), maxLat: f32(dv, 20), maxLon: f32(dv, 24),
      featureCount: u64(dv, 28), blockCount: u32(dv, 36),
      dictOffset: u64(dv, 40), dictLength: u32(dv, 48),
      indexOffset: u64(dv, 52), indexLength: u32(dv, 60),
      blocksOffset: u64(dv, 64),
    };

    const dict = h.dictLength > 0 ? buf.subarray(h.dictOffset, h.dictOffset + h.dictLength) : new Uint8Array(0);
    const sl = buf.subarray(h.indexOffset, h.indexOffset + h.indexLength);
    const dv2 = new DataView(sl.buffer, sl.byteOffset, sl.length);
    const cnt = u32(dv2, 0);
    const entries = [];
    const cellMap = new Map();

    // v1 index: 19-byte entries
    let off = 4;
    for (let i = 0; i < cnt && off + 19 <= sl.length; i++) {
      const cb = (() => { let r = 0n; for (let j = 0; j < 8; j++) r |= BigInt(sl[off + j]) << BigInt(j * 8); return r; })();
      const bo = readPacked(sl, off + 8, 6);
      const bl = readPacked(sl, off + 14, 3);
      const fc = u16(dv2, off + 17);
      entries.push({ h3Cell: cb, blockOffset: bo, blockLength: bl, featureCount: fc });
      const mask7 = BigInt('0xfffffffff8000000');
      cellMap.set(cb & mask7, i);
      off += 19;
    }

    return new PtilesDemoReader(buf, h, entries, cellMap, dict);
  }

  async query(lat, lon) {
    const cellHex = h3.latLngToCell(lat, lon, 7);
    const cellInt = (typeof cellHex === 'bigint' ? cellHex : BigInt('0x' + cellHex)) & BigInt('0xfffffffff8000000');
    const ei = this.cellMap.get(cellInt);
    if (ei === undefined) return null;

    const entry = this.entries[ei];
    const abs = this.relOff ? this.header.blocksOffset + entry.blockOffset : entry.blockOffset;
    const compressed = this.data.subarray(abs, abs + entry.blockLength);
    const raw = await zstdDecompress(compressed, this.dict);

    // Parse string table
    const strCount = raw[0];
    let p = 1;
    const strings = [];
    for (let i = 0; i < strCount; i++) {
      const slen = raw[p++];
      let s = '';
      for (let j = 0; j < slen; j++) s += String.fromCharCode(raw[p + j]);
      strings.push(s);
      p += slen;
    }

    // Cell center
    const center = h3.cellToLatLng(cellHex);
    const cx = Math.round(center[1] * 100000);
    const cy = Math.round(center[0] * 100000);

    let bestDist = Infinity;
    let best = null;
    let prevOsm = 0;

    while (p + 4 <= raw.length) {
      const rl = u32(new DataView(raw.buffer, raw.byteOffset + p, 4), 0);
      p += 4;
      if (p + rl > raw.length) break;
      const rec = raw.subarray(p, p + rl);
      let rp = 0;

      const dr = decodeVarint(rec, rp); rp += dr.consumed;
      const osmDelta = Number(BigInt.asIntN(64, dr.value >> 1n) ^ BigInt.asIntN(64, -(dr.value & 1n)));
      const osmId = (prevOsm + osmDelta) >>> 0;
      prevOsm = osmId;

      const flags = rec[rp++];
      let vc = (flags >> 4) & 0x0f;
      if (vc === 0x0f) vc = rec[rp++]; else vc += 4;

      if (vc === 0 || rp + 4 > rec.length) { p += rl; continue; }

      const fl = i16(new DataView(rec.buffer, rec.byteOffset + rp, 2), 0);
      const fa = i16(new DataView(rec.buffer, rec.byteOffset + rp + 2, 2), 0);
      rp += 4;

      // Decode walls
      let prevLon = cx + fl;
      let prevLat = cy + fa;
      let coords = [[prevLon / 100000, prevLat / 100000]];

      for (let w = 1; w < vc; w++) {
        const r1 = decodeVarint(rec, rp); rp += r1.consumed;
        const r2 = decodeVarint(rec, rp); rp += r2.consumed;
        prevLon += zigzagI32(r1.value);
        prevLat += zigzagI32(r2.value);
        coords.push([prevLon / 100000, prevLat / 100000]);
      }

      // Building type
      if (rp >= rec.length) { p += rl; continue; }
      const bt = rec[rp++];
      let btype = (bt === 0xff) ? String.fromCharCode(...rec.slice(rp, rp + rec[rp] + 1)) : (bt < strings.length ? strings[bt] : 'yes');
      if (bt === 0xff) rp += 1 + rec[rp];

      // flags2 optional fields
      let name = null;
      if (rp < rec.length) {
        const f2 = rec[rp++];
        if (f2 & 0x01 && rp < rec.length) {
          const idx = rec[rp++];
          name = idx === 0xff ? String.fromCharCode(...rec.slice(rp + 1, rp + 1 + rec[rp])) : (idx < strings.length ? strings[idx] : null);
          if (idx === 0xff) rp += 1 + rec[rp - 1];
        }
      }

      // Centroid
      const cl = coords.reduce((s, c) => s + c[0], 0) / coords.length;
      const ca = coords.reduce((s, c) => s + c[1], 0) / coords.length;

      // Point-in-polygon
      const inside = (() => {
        let hit = false;
        for (let i = 0, j = coords.length - 1; i < coords.length; j = i++) {
          const [xi, yi] = coords[i], [xj, yj] = coords[j];
          if ((yi > lat) !== (yj > lat) && lon < ((xj - xi) * (lat - yi)) / (yj - yi) + xi) hit = !hit;
        }
        return hit;
      })();

      if (inside) return { osmId, buildingType: btype, name, coordinates: coords, centroidLat: ca, centroidLon: cl, inPoly: true };

      const d = (() => {
        const dLat = (ca - lat) * Math.PI / 180;
        const dLon = (cl - lon) * Math.PI / 180;
        const a = Math.sin(dLat/2)**2 + Math.cos(lat * Math.PI / 180) * Math.cos(ca * Math.PI / 180) * Math.sin(dLon/2)**2;
        return 6371000 * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
      })();

      if (d < bestDist) { bestDist = d; best = { osmId, buildingType: btype, name, coordinates: coords, centroidLat: ca, centroidLon: cl }; }
      p += rl;
    }

    return bestDist < 50 ? best : null;
  }
}

// ─── UI ───────────────────────────────────────────────────────────

const stateSel = document.getElementById('state');
const presetSel = document.getElementById('preset');
const latInput = document.getElementById('lat');
const lonInput = document.getElementById('lon');
const goBtn = document.getElementById('go');
const resultDiv = document.getElementById('result');
const statusDiv = document.getElementById('status');

presetSel.addEventListener('change', () => {
  const [lat, lon] = presetSel.value.split(',');
  latInput.value = lat;
  lonInput.value = lon;
});

stateSel.addEventListener('change', () => {
  presetSel.selectedIndex = 0;
});

latInput.addEventListener('input', () => { presetSel.selectedIndex = 0; });
lonInput.addEventListener('input', () => { presetSel.selectedIndex = 0; });

let readerCache = {};

goBtn.addEventListener('click', async () => {
  const state = stateSel.value;
  const lat = parseFloat(latInput.value);
  const lon = parseFloat(lonInput.value);

  if (isNaN(lat) || isNaN(lon)) {
    resultDiv.innerHTML = '<div class="err">Enter valid coordinates.</div>';
    resultDiv.classList.remove('loading');
    return;
  }

  resultDiv.innerHTML = '<div class="err">Loading PTILES file...</div>';
  resultDiv.classList.add('loading');
  goBtn.disabled = true;
  statusDiv.textContent = `Fetching ${state}.buildings_v8.ptiles...`;

  try {
    let reader = readerCache[state];
    if (!reader) {
      const url = `https://maps.mydatatimeline.com/maps/${state}.buildings_v8.ptiles`;
      statusDiv.textContent = `Downloading ${url}...`;
      reader = await PtilesDemoReader.fromUrl(url);
      readerCache[state] = reader;
      statusDiv.textContent = `Loaded ${state}.buildings_v8.ptiles (${reader.header.featureCount.toLocaleString()} buildings)`;
    } else {
      statusDiv.textContent = `Using cached ${state} reader`;
    }

    statusDiv.textContent = `Querying (${lat.toFixed(4)}, ${lon.toFixed(4)})...`;
    const b = await reader.query(lat, lon);

    resultDiv.classList.remove('loading');

    if (!b) {
      resultDiv.innerHTML = `
        <div class="badge null">No building found</div>
        <p style="margin-top:12px;color:#777">No building within 50m of (${lat.toFixed(4)}, ${lon.toFixed(4)}) in ${state}.</p>
        <p style="color:#555;font-size:12px">The buildings file has ${reader.header.featureCount.toLocaleString()} footprints. Try a different location — downtown areas work best.</p>
      `;
      statusDiv.textContent = 'No building found';
    } else {
      resultDiv.innerHTML = `
        <div class="building-name">${b.name || 'Unnamed building'}</div>
        <div class="building-type">${b.buildingType} ${b.inPoly ? '' : '(nearest)'}</div>
        <div class="row"><span class="label">OSM ID</span><span class="val">${b.osmId}</span></div>
        <div class="row"><span class="label">Centroid</span><span class="val">${b.centroidLat.toFixed(5)}, ${b.centroidLon.toFixed(5)}</span></div>
        <div class="row"><span class="label">Vertices</span><span class="val">${b.coordinates.length}</span></div>
        <div class="row"><span class="label">Distance</span><span class="val">${haversineKm(lat, lon, b.centroidLat, b.centroidLon).toFixed(1)} m</span></div>
        <div class="badge found">Building found</div>
        <div class="coords-preview">${b.coordinates.map(c => `[${c[0].toFixed(5)}, ${c[1].toFixed(5)}]`).join(', ')}</div>
      `;
      statusDiv.textContent = `Found ${b.name || b.buildingType} (OSM ${b.osmId})`;
    }
  } catch (e) {
    resultDiv.classList.remove('loading');
    resultDiv.innerHTML = `<div class="err">Error: ${e.message}</div>`;
    statusDiv.textContent = 'Error';
    console.error(e);
  } finally {
    goBtn.disabled = false;
  }
});

function haversineKm(lat1, lon1, lat2, lon2) {
  const R = 6371000;
  const dLat = (lat2 - lat1) * Math.PI / 180;
  const dLon = (lon2 - lon1) * Math.PI / 180;
  const a = Math.sin(dLat/2)**2 + Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) * Math.sin(dLon/2)**2;
  return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
}

// Kick off a default query on load
document.addEventListener('DOMContentLoaded', () => goBtn.click());
</script>
</body>
</html>
