<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ptiles &middot; map</title>
<link rel="icon" type="image/svg+xml" href="/static/favicon.svg">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#09090e;color:#c8c8d0;height:100vh;display:flex;flex-direction:column;overflow:hidden}
#topbar{background:#0f0f17;border-bottom:1px solid #1a1a28;padding:0;display:flex;align-items:stretch;flex-wrap:nowrap;min-height:44px}
#topbar .brand{display:flex;align-items:center;padding:0 16px;background:#141420;border-right:1px solid #1a1a28;gap:8px}
#topbar .brand svg{width:18px;height:18px;display:block}
#topbar .brand span{font-size:13px;font-weight:600;color:#e8e8f0;letter-spacing:.5px}
#topbar .brand small{font-size:10px;color:#555}
#topbar .section{display:flex;align-items:center;gap:8px;padding:0 12px;border-right:1px solid #1a1a28}
#topbar .section:last-child{border-right:none}
#topbar .section label{font-size:10px;color:#555;text-transform:uppercase;letter-spacing:.8px}
.coord-input{background:#09090e;border:1px solid #1e1e2a;border-radius:4px;padding:5px 8px;color:#c8c8d0;font-size:12px;font-family:'SF Mono','Cascadia Code',monospace;width:130px;outline:none;transition:border-color .15s}
.coord-input:focus{border-color:#3b3b5c}
.coord-input::placeholder{color:#333}
.btn{background:#1a1a28;border:1px solid #2a2a3e;border-radius:4px;padding:5px 12px;color:#c8c8d0;font-size:11px;cursor:pointer;transition:all .1s;font-weight:500;white-space:nowrap}
.btn:hover{background:#252540;border-color:#3b3b5c;color:#e8e8f0}
.btn:active{background:#303050}
.btn.primary{background:#2a2a4e;border-color:#3b3b6c;color:#d0d0f0}
.btn.primary:hover{background:#353560;border-color:#505080}
.btn.active{background:#1a3a2a;border-color:#2a6a4a;color:#4ade80}
.btn-sm{padding:3px 8px;font-size:10px}
select{background:#09090e;border:1px solid #1e1e2a;border-radius:4px;padding:5px 8px;color:#c8c8d0;font-size:11px;outline:none;cursor:pointer}
select:focus{border-color:#3b3b5c}
#stats{font-size:11px;color:#666;display:flex;gap:16px;align-items:center;margin-left:auto;padding:0 16px}
#stats .stat{display:flex;gap:6px;align-items:center}
#stats .num{color:#c8c8d0;font-weight:500}
#stats .label{color:#555;font-size:10px;text-transform:uppercase;letter-spacing:.5px}
#map{flex:1;z-index:0}
#log-bar{display:none;background:#0a0a10;border-bottom:1px solid #1a1a28;padding:4px 12px}
#log-bar textarea{width:100%;height:48px;background:#0a0a10;color:#555;border:1px solid #1a1a28;border-radius:4px;font-family:'SF Mono','Cascadia Code',monospace;font-size:10px;padding:4px 8px;resize:vertical;white-space:pre;overflow:auto;outline:none}
#log-bar textarea:focus{border-color:#2a2a3e}
.leaflet-container{background:#0a0a12}
.leaflet-control-zoom a{background:#141420!important;color:#c8c8d0!important;border-color:#1a1a28!important}
.leaflet-control-zoom a:hover{background:#1e1e30!important}
.leaflet-popup-content-wrapper{background:#141420!important;color:#c8c8d0!important;border-radius:6px!important;box-shadow:0 4px 20px rgba(0,0,0,.5)!important;border:1px solid #1a1a28!important}
.leaflet-popup-tip{background:#141420!important;border:1px solid #1a1a28!important}
.leaflet-popup-content{margin:10px 14px!important;font-size:12px!important;line-height:1.5!important}
.popup-title{color:#e8e8f0;font-weight:600;font-size:13px}
.popup-meta{color:#666;font-size:10px;margin-top:2px}
.popup-label{color:#555;font-size:10px;text-transform:uppercase;letter-spacing:.5px}
#toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:#1a1a28;color:#c8c8d0;padding:8px 20px;border-radius:6px;font-size:12px;z-index:10000;display:none;border:1px solid #2a2a3e;box-shadow:0 4px 12px rgba(0,0,0,.4)}
.legend{background:rgba(15,15,23,.92)!important;border:1px solid #1a1a28!important;border-radius:6px!important;padding:8px 12px!important;font-size:11px!important;color:#c8c8d0!important;line-height:1.6!important}
.legend-item{display:flex;align-items:center;gap:8px}
.legend-swatch{width:20px;height:3px;border-radius:2px}
.legend-swatch.ptiles{background:#e94560}
.legend-swatch.osrm{background:#4488ff}
@media(max-width:900px){#topbar{flex-wrap:wrap;min-height:auto}.coord-input{width:100px;font-size:11px}#topbar .section{padding:4px 8px}#stats{padding:4px 8px;flex-wrap:wrap;gap:8px}.brand{display:none!important}}
</style>
</head>
<body>

<div id="topbar">
  <div class="brand">
    <svg viewBox="0 0 24 24" fill="none" stroke="#4ade80" stroke-width="1.5"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/></svg>
    <span>ptiles</span>
    <small>v8</small>
  </div>

  <div class="section">
    <label>Origin</label>
    <input id="origin-input" class="coord-input" placeholder="lat,lon" value="36.1384,-86.8004">
  </div>

  <div class="section">
    <label>Dest</label>
    <input id="dest-input" class="coord-input" placeholder="lat,lon" value="36.1262,-86.8461">
  </div>

  <div class="section">
    <button class="btn primary" onclick="route()">Route</button>
    <button class="btn btn-sm" onclick="randomRoute()">Random</button>
    <label style="display:flex;align-items:center;gap:4px;cursor:pointer;font-size:10px;color:#555">
      <input type="checkbox" id="auto-random" onchange="toggleAutoRandom()" style="accent-color:#4ade80"> Auto
    </label>
  </div>

  <div class="section">
    <select id="profile-select" onchange="route()">
      <option value="driving">Driving</option>
      <option value="walking">Walking</option>
      <option value="cycling">Cycling</option>
    </select>
  </div>

  <div class="section">
    <button class="btn btn-sm" id="btn-roads" onclick="toggleRoadsLayer()">Roads</button>
    <button class="btn btn-sm" id="btn-buildings" onclick="toggleBuildingsLayer()">Buildings</button>
    <button class="btn btn-sm" id="btn-basemap" onclick="toggleBasemap()">OSM</button>
    <button class="btn btn-sm" id="btn-log" onclick="toggleLog()" style="color:#555">Log</button>
  </div>

  <div id="stats"></div>
</div>

<div id="log-bar">
  <textarea id="route-log" readonly onclick="this.select();navigator.clipboard.writeText(this.value);showToast('Copied')"></textarea>
</div>

<div id="map"></div>
<div id="toast"></div>

<script>
const map = L.map('map', { zoomControl: true }).setView([36.15, -86.78], 12);

// --- Basemaps ---
const osmTile = L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
  attribution: '&copy; OpenStreetMap', maxZoom: 19
});
const freeMapTile = L.tileLayer('https://tiles.openfreemap.org/{z}/{x}/{y}.png', {
  attribution: '&copy; OpenFreeMap', maxZoom: 19
});
let currentBasemap = 'osm';
osmTile.addTo(map);

// --- State ---
let ptilesLayer = null, osrmLayer = null, autoTimer = null, searchMarker = null;
let roadsLayer = null, roadsVisible = false, roadsTimer = null;
let buildingsLayer = null, buildingsVisible = false, buildingsTimer = null;
let clickBuildingHighlight = null;
let toastTimer = null;
let roadLegend = null;

function showToast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.style.display = 'block';
  if (toastTimer) clearTimeout(toastTimer);
  toastTimer = setTimeout(() => { el.style.display = 'none'; }, 3000);
}

function parseLatLon(str) {
  const parts = str.split(',').map(s => parseFloat(s.trim()));
  if (parts.length === 2 && !isNaN(parts[0]) && !isNaN(parts[1])) return parts;
  return null;
}

function fmtDuration(sec) {
  if (!sec) return '';
  if (sec >= 3600) return `${(sec / 3600).toFixed(1)}h`;
  if (sec >= 120) return `${(sec / 60).toFixed(1)}min`;
  return `${Math.round(sec)}s`;
}

function fmtDist(m) {
  if (!m) return '';
  if (m >= 1000) return `${(m / 1000).toFixed(1)}km`;
  return `${Math.round(m)}m`;
}

function updateStats(ptiles, osrm) {
  const el = document.getElementById('stats');
  let html = '';
  if (ptiles && ptiles.duration_seconds) {
    html += `<span class="stat"><span class="label">ptiles</span><span class="num">${fmtDuration(ptiles.duration_seconds)} / ${fmtDist(ptiles.distance_meters)}</span></span>`;
  }
  if (osrm && osrm.duration_seconds) {
    html += `<span class="stat"><span class="label">osrm</span><span class="num">${fmtDuration(osrm.duration_seconds)} / ${fmtDist(osrm.distance_meters)}</span></span>`;
  }
  el.innerHTML = html || '<span class="stat" style="color:#333">no route</span>';
}

function drawRoute(data, color, label) {
  if (!data || !data.path || data.path.length < 2) return null;
  const coords = data.path.map(p => [p[1], p[0]]);
  const polyline = L.polyline(coords, { color, weight: 5, opacity: 0.75 }).addTo(map);
  polyline.bindPopup(`
    <div class="popup-title">${label}</div>
    <div class="popup-meta">${(data.duration_seconds / 60).toFixed(1)} min &middot; ${(data.distance_meters / 1000).toFixed(1)} km</div>
  `);
  return polyline;
}

// --- Basemap toggle ---
function toggleBasemap() {
  const btn = document.getElementById('btn-basemap');
  if (currentBasemap === 'osm') {
    map.removeLayer(osmTile); freeMapTile.addTo(map);
    currentBasemap = 'freemap'; btn.textContent = 'FreeMap';
  } else {
    map.removeLayer(freeMapTile); osmTile.addTo(map);
    currentBasemap = 'osm'; btn.textContent = 'OSM';
  }
}

function toggleLog() {
  const bar = document.getElementById('log-bar');
  bar.style.display = bar.style.display === 'none' ? 'block' : 'none';
}

// --- Roads layer ---
function toggleRoadsLayer() {
  const btn = document.getElementById('btn-roads');
  roadsVisible = !roadsVisible;
  if (roadsVisible) {
    btn.classList.add('active');
    loadRoadsForViewport();
    map.on('moveend', onMapMoveEnd);
    if (!roadLegend) {
      roadLegend = L.control({position: 'bottomright'});
      roadLegend.onAdd = () => {
        const div = L.DomUtil.create('div', 'legend');
        div.innerHTML = `
          <div class="legend-item"><span class="legend-swatch" style="background:#ff6600"></span>Motorway</div>
          <div class="legend-item"><span class="legend-swatch" style="background:#dd4400"></span>Trunk</div>
          <div class="legend-item"><span class="legend-swatch" style="background:#ff9900"></span>Primary</div>
          <div class="legend-item"><span class="legend-swatch" style="background:#ffcc00"></span>Secondary</div>
          <div class="legend-item"><span class="legend-swatch" style="background:#ffff66"></span>Tertiary</div>
          <div class="legend-item"><span class="legend-swatch" style="background:#88aaff"></span>Residential</div>
        `;
        return div;
      };
      roadLegend.addTo(map);
    }
  } else {
    btn.classList.remove('active');
    map.off('moveend', onMapMoveEnd);
    if (roadsLayer) { map.removeLayer(roadsLayer); roadsLayer = null; }
    if (roadLegend) { map.removeControl(roadLegend); roadLegend = null; }
  }
}

function onMapMoveEnd() {
  if (roadsTimer) clearTimeout(roadsTimer);
  roadsTimer = setTimeout(loadRoadsForViewport, 300);
  if (buildingsTimer) clearTimeout(buildingsTimer);
  buildingsTimer = setTimeout(loadBuildingsForViewport, 300);
}

async function loadRoadsForViewport() {
  if (!roadsVisible) return;
  const b = map.getBounds();
  const minLat = b.getSouth(), minLon = b.getWest();
  const maxLat = b.getNorth(), maxLon = b.getEast();

  try {
    const res = await fetch(`/api/roads-bounds?min_lat=${minLat}&min_lon=${minLon}&max_lat=${maxLat}&max_lon=${maxLon}`);
    const data = await res.json();
    if (data.error) { return; }
    if (!data.features) return;

    if (roadsLayer) map.removeLayer(roadsLayer);

    const zoom = map.getZoom();
    const major = { motorway: '#ff6600', trunk: '#dd4400', primary: '#ff9900', secondary: '#ffcc00', tertiary: '#ffff66' };
    const minor = { residential: '#88aaff', service: '#6688cc' };
    const skipClasses = ['footway', 'path', 'cycleway', 'pedestrian', 'track'];
    const skipMinor = zoom < 13;
    const skipTertiary = zoom < 11;

    const segs = [];
    for (const f of data.features) {
      const cls = (f.properties.road_class || '').toLowerCase();
      if (skipClasses.includes(cls)) continue;
      if (skipMinor && !major[cls]) continue;
      if (skipTertiary && !['motorway', 'trunk', 'primary'].includes(cls)) continue;
      const coords = f.geometry.coordinates.map(c => [c[1], c[0]]);
      const color = major[cls] || minor[cls] || '#666688';
      const weight = major[cls] ? 2.5 : 1.5;
      segs.push(L.polyline(coords, { color, weight, opacity: 0.5 }));
    }
    roadsLayer = L.layerGroup(segs).addTo(map);
  } catch(e) {}
}

// --- Buildings layer ---
function toggleBuildingsLayer() {
  const btn = document.getElementById('btn-buildings');
  buildingsVisible = !buildingsVisible;
  if (buildingsVisible) {
    btn.classList.add('active');
    loadBuildingsForViewport();
    map.on('moveend', onMapMoveEndBuildings);
  } else {
    btn.classList.remove('active');
    map.off('moveend', onMapMoveEndBuildings);
    if (buildingsLayer) { map.removeLayer(buildingsLayer); buildingsLayer = null; }
  }
}

function onMapMoveEndBuildings() {
  if (buildingsTimer) clearTimeout(buildingsTimer);
  buildingsTimer = setTimeout(loadBuildingsForViewport, 300);
}

async function loadBuildingsForViewport() {
  if (!buildingsVisible) return;
  const b = map.getBounds();
  const minLat = b.getSouth(), minLon = b.getWest();
  const maxLat = b.getNorth(), maxLon = b.getEast();
  const span = maxLat - minLat;
  if (span > 0.05) return;

  try {
    const res = await fetch(`/api/buildings-bounds?min_lat=${minLat}&min_lon=${minLon}&max_lat=${maxLat}&max_lon=${maxLon}`);
    const data = await res.json();
    if (data.error || !data.features) return;

    if (buildingsLayer) map.removeLayer(buildingsLayer);
    const polys = [];
    for (const f of data.features) {
      const ring = f.geometry.coordinates[0].map(c => [c[1], c[0]]);
      const name = f.properties.name || '';
      const type = f.properties.building_type || '';
      const poly = L.polygon(ring, { color: '#ffaa44', weight: 1, opacity: 0.7, fillOpacity: 0.15 });
      if (name) poly.bindPopup(`<div class="popup-title">${name}</div><div class="popup-meta">${type}</div>`);
      polys.push(poly);
    }
    buildingsLayer = L.layerGroup(polys).addTo(map);
  } catch(e) {}
}

// --- Routing ---
async function route() {
  const origin = parseLatLon(document.getElementById('origin-input').value);
  const dest = parseLatLon(document.getElementById('dest-input').value);
  if (!origin || !dest) { showToast('Invalid coordinates'); return; }

  if (ptilesLayer) { map.removeLayer(ptilesLayer); ptilesLayer = null; }
  if (osrmLayer) { map.removeLayer(osrmLayer); osrmLayer = null; }
  if (searchMarker) { map.removeLayer(searchMarker); searchMarker = null; }

  L.circleMarker([origin[0], origin[1]], { color: '#4ade80', radius: 6, fillOpacity: 0.8 }).addTo(map);
  L.circleMarker([dest[0], dest[1]], { color: '#f87171', radius: 6, fillOpacity: 0.8 }).addTo(map);
  map.fitBounds([[origin[0], origin[1]], [dest[0], dest[1]]], { padding: [50, 50] });

  const profile = document.getElementById('profile-select').value;
  const [ptilesRes, osrmRes] = await Promise.all([
    fetch(`/api/route?lat1=${origin[0]}&lon1=${origin[1]}&lat2=${dest[0]}&lon2=${dest[1]}&profile=${profile}`).then(r => r.json()),
    fetch(`/api/route-osrm?lat1=${origin[0]}&lon1=${origin[1]}&lat2=${dest[0]}&lon2=${dest[1]}`).then(r => r.json()),
  ]);

  if (ptilesRes.error) showToast('ptiles: ' + ptilesRes.error);
  if (osrmRes.error) showToast('OSRM: ' + osrmRes.error);

  ptilesLayer = drawRoute(ptilesRes, '#e94560', 'ptiles');
  osrmLayer = drawRoute(osrmRes, '#4488ff', 'OSRM');
  updateStats(ptilesRes, osrmRes);

  const logEl = document.getElementById('route-log');
  const ptilesOk = ptilesRes.distance_meters ? 'OK' : ('ERR: ' + (ptilesRes.error || 'no data'));
  const osrmOk = osrmRes.distance_meters ? 'OK' : ('ERR: ' + (osrmRes.error || 'no data'));
  const ptilesKm = ptilesRes.distance_meters ? (ptilesRes.distance_meters / 1000).toFixed(1) : '?';
  const osrmKm = osrmRes.distance_meters ? (osrmRes.distance_meters / 1000).toFixed(1) : '?';
  const ptilesMin = ptilesRes.duration_seconds ? (ptilesRes.duration_seconds / 60).toFixed(1) : '?';
  const osrmMin = osrmRes.duration_seconds ? (osrmRes.duration_seconds / 60).toFixed(1) : '?';
  const fc = ptilesRes.from_cell ? ptilesRes.from_cell.toString(16) : '?';
  const tc = ptilesRes.to_cell ? ptilesRes.to_cell.toString(16) : '?';
  logEl.value = [
    `src=${origin[0].toFixed(4)},${origin[1].toFixed(4)}  dst=${dest[0].toFixed(4)},${dest[1].toFixed(4)}  profile=${profile}`,
    `ptiles  ${ptilesOk}  ${ptilesKm}km  ${ptilesMin}min  ${ptilesRes.segments||'?'}seg  ${ptilesRes.path?ptilesRes.path.length+'pts':'?'}  from=${fc}  to=${tc}`,
    `osrm    ${osrmOk}  ${osrmKm}km  ${osrmMin}min`,
  ].join('\n');
}

async function randomRoute() {
  const res = await fetch('/api/random-route');
  const data = await res.json();
  if (data.origin && data.dest) {
    document.getElementById('origin-input').value = `${data.origin.lat.toFixed(4)},${data.origin.lon.toFixed(4)}`;
    document.getElementById('dest-input').value = `${data.dest.lat.toFixed(4)},${data.dest.lon.toFixed(4)}`;
    route();
  }
}

function toggleAutoRandom() {
  const checked = document.getElementById('auto-random').checked;
  if (checked) { autoTimer = setInterval(randomRoute, 3000); randomRoute(); }
  else { clearInterval(autoTimer); autoTimer = null; }
}

// --- Click: set origin + highlight nearest building ---
map.on('click', async (e) => {
  const { lat, lng } = e.latlng;
  document.getElementById('origin-input').value = `${lat.toFixed(4)},${lng.toFixed(4)}`;

  if (clickBuildingHighlight) { map.removeLayer(clickBuildingHighlight); clickBuildingHighlight = null; }

  try {
    const res = await fetch(`/api/buildings?lat=${lat}&lon=${lng}`);
    const data = await res.json();
    if (data.nearest) {
      const f = data.nearest;
      const ring = f.geometry.coordinates[0].map(c => [c[1], c[0]]);
      const name = f.properties.name || '';
      const type = f.properties.building_type || '';
      clickBuildingHighlight = L.polygon(ring, {
        color: '#4ade80', weight: 3, opacity: 1, fillOpacity: 0.25, fillColor: '#4ade80'
      }).addTo(map);
      clickBuildingHighlight.bindPopup(`
        <div class="popup-title">${name || type || 'Building'}</div>
        ${name ? `<div class="popup-meta">${type}</div>` : ''}
        <div class="popup-label" style="margin-top:4px">osm ${f.properties.osm_id}</div>
      `);
      clickBuildingHighlight.openPopup();
    } else {
      L.popup().setLatLng([lat, lng])
        .setContent('<div style="color:#666;font-size:11px">No building found</div>')
        .openOn(map);
    }
  } catch(e) {}
});

// --- Legend control for route overlay ---
L.control({position: 'bottomleft'}).onAdd = () => {
  const div = L.DomUtil.create('div', 'legend');
  div.innerHTML = `
    <div class="legend-item"><span class="legend-swatch ptiles"></span>ptiles</div>
    <div class="legend-item"><span class="legend-swatch osrm"></span>OSRM</div>
  `;
  return div;
}.addTo(map);

// Initial route
route();
</script>
</body>
</html>
