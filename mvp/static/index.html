<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ptiles MVP — Route Compare</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #1a1a2e; color: #e0e0e0; height: 100vh; display: flex; flex-direction: column; }
#header { background: #16213e; padding: 12px 20px; display: flex; align-items: center; gap: 12px; border-bottom: 1px solid #0f3460; flex-wrap: wrap; }
#header h1 { font-size: 18px; color: #e94560; margin: 0; }
#header input { padding: 8px 12px; border: 1px solid #0f3460; border-radius: 6px; background: #1a1a2e; color: #e0e0e0; font-size: 14px; width: 180px; }
#header input::placeholder { color: #555; }
#header button { padding: 8px 16px; border: none; border-radius: 6px; cursor: pointer; font-size: 14px; background: #e94560; color: white; }
#header button:hover { background: #c23350; }
#header button.secondary { background: #0f3460; }
#header button.secondary:hover { background: #1a4a80; }
#header button.active { background: #22c55e; color: #000; }
#header label { font-size: 13px; color: #aaa; display: flex; align-items: center; gap: 6px; }
#header .stats { font-size: 12px; color: #888; margin-left: auto; display: flex; gap: 20px; }
#map { flex: 1; }
.legend { background: rgba(22, 33, 62, 0.9); padding: 10px 14px; border-radius: 8px; font-size: 13px; line-height: 1.6; }
.legend-item { display: flex; align-items: center; gap: 8px; }
.legend-color { width: 24px; height: 4px; border-radius: 2px; }
.route-info { background: rgba(22, 33, 62, 0.9); padding: 8px 14px; border-radius: 8px; margin-top: 6px; font-size: 13px; }
.route-info div { margin: 2px 0; }
.building-popup { font-size: 13px; }
.building-popup strong { color: #e94560; }
.error-toast { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background: #c23350; color: white; padding: 10px 20px; border-radius: 6px; font-size: 14px; z-index: 10000; display: none; }
@media (max-width: 800px) { #header input { width: 120px; } #header { gap: 6px; } }
</style>
</head>
<body>
<div id="header">
  <h1>ptiles</h1>
  <input id="origin-input" placeholder="Origin lat,lon" value="36.1384,-86.8004">
  <input id="dest-input" placeholder="Dest lat,lon" value="36.1262,-86.8461">
  <button onclick="route()">Route</button>
  <button class="secondary" onclick="randomRoute()">Random</button>
  <label><input type="checkbox" id="auto-random" onchange="toggleAutoRandom()"> Auto</label>
  <button class="secondary" id="btn-roads" onclick="toggleRoadsLayer()">Show Roads</button>
  <button class="secondary" id="btn-buildings" onclick="toggleBuildingsLayer()">Show Buildings</button>
  <select id="profile-select" onchange="route()" style="padding:8px 12px;border:1px solid #0f3460;border-radius:6px;background:#1a1a2e;color:#e0e0e0;font-size:14px;">
    <option value="driving">Driving</option>
    <option value="walking">Walking</option>
    <option value="cycling">Cycling</option>
  </select>
  <button class="secondary" id="btn-basemap" onclick="toggleBasemap()">OSM</button>
  <div class="stats" id="stats"></div>
</div>
<div id="map"></div>
<div id="error" class="error-toast"></div>

<script>
const map = L.map('map').setView([36.15, -86.78], 12);

// --- Basemap layers ---
const osmTile = L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
  attribution: '&copy; OpenStreetMap',
  maxZoom: 19
});
const freeMapTile = L.tileLayer('https://tiles.openfreemap.org/{z}/{x}/{y}.png', {
  attribution: '&copy; OpenFreeMap',
  maxZoom: 19
});

let currentBasemap = 'osm';
osmTile.addTo(map);

// --- State ---
let ptilesLayer = null;
let osrmLayer = null;
let autoTimer = null;
let searchMarker = null;
let roadsLayer = null;
let roadsVisible = false;
let roadsTimer = null;
let buildingsLayer = null;
let buildingsVisible = false;
let buildingsTimer = null;

function showError(msg) {
  const el = document.getElementById('error');
  el.textContent = msg;
  el.style.display = 'block';
  setTimeout(() => el.style.display = 'none', 5000);
}

function parseLatLon(str) {
  const parts = str.split(',').map(s => parseFloat(s.trim()));
  if (parts.length === 2 && !isNaN(parts[0]) && !isNaN(parts[1])) return parts;
  return null;
}

function updateStats(ptiles, osrm) {
  const el = document.getElementById('stats');
  let html = '';
  if (ptiles && ptiles.duration_seconds) {
    html += `ptiles: ${(ptiles.duration_seconds / 60).toFixed(1)}min ${(ptiles.distance_meters / 1000).toFixed(1)}km`;
  }
  if (osrm && osrm.duration_seconds) {
    if (html) html += ' &nbsp;|&nbsp; ';
    html += `OSRM: ${(osrm.duration_seconds / 60).toFixed(1)}min ${(osrm.distance_meters / 1000).toFixed(1)}km`;
  }
  el.innerHTML = html || '';
}

function drawRoute(data, color, label) {
  if (!data || !data.path || data.path.length < 2) return null;
  const coords = data.path.map(p => [p[1], p[0]]); // [lat, lon]
  // Semi-transparent thicker lines so overlaps are visible
  const polyline = L.polyline(coords, { color, weight: 5, opacity: 0.75 }).addTo(map);
  polyline.bindPopup(`
    <div class="route-info">
      <div><b>${label}</b></div>
      <div>${(data.duration_seconds / 60).toFixed(1)} min</div>
      <div>${(data.distance_meters / 1000).toFixed(1)} km</div>
    </div>
  `);
  return polyline;
}

// --- Basemap toggle ---
function toggleBasemap() {
  const btn = document.getElementById('btn-basemap');
  if (currentBasemap === 'osm') {
    map.removeLayer(osmTile);
    freeMapTile.addTo(map);
    currentBasemap = 'freemap';
    btn.textContent = 'FreeMap';
  } else {
    map.removeLayer(freeMapTile);
    osmTile.addTo(map);
    currentBasemap = 'osm';
    btn.textContent = 'OSM';
  }
}

// --- Roads layer ---
function toggleRoadsLayer() {
  const btn = document.getElementById('btn-roads');
  roadsVisible = !roadsVisible;
  if (roadsVisible) {
    btn.textContent = 'Hide Roads';
    btn.classList.add('active');
    loadRoadsForViewport();
    map.on('moveend', onMapMoveEnd);
  } else {
    btn.textContent = 'Show Roads';
    btn.classList.remove('active');
    map.off('moveend', onMapMoveEnd);
    if (roadsLayer) { map.removeLayer(roadsLayer); roadsLayer = null; }
  }
}

function onMapMoveEnd() {
  if (roadsTimer) clearTimeout(roadsTimer);
  roadsTimer = setTimeout(loadRoadsForViewport, 300);
  if (buildingsTimer) clearTimeout(buildingsTimer);
  buildingsTimer = setTimeout(loadBuildingsForViewport, 300);
}

async function loadRoadsForViewport() {
  if (!roadsVisible) return;
  const b = map.getBounds();
  const minLat = b.getSouth(), minLon = b.getWest();
  const maxLat = b.getNorth(), maxLon = b.getEast();

  try {
    const res = await fetch(`/api/roads-bounds?min_lat=${minLat}&min_lon=${minLon}&max_lat=${maxLat}&max_lon=${maxLon}`);
    const data = await res.json();
    if (data.error) { showError('Roads: ' + data.error); return; }
    if (!data.features) return;

    if (roadsLayer) map.removeLayer(roadsLayer);

    const zoom = map.getZoom();
    // Zoom-aware filtering: fewer road types at low zoom
    const major = { motorway: '#ff6600', trunk: '#dd4400', primary: '#ff9900',
                    secondary: '#ffcc00', tertiary: '#ffff66' };
    const minor = { residential: '#88aaff', service: '#6688cc' };

    // Skip footways, paths, cycleways, pedestrian, track everywhere
    const skipClasses = ['footway', 'path', 'cycleway', 'pedestrian', 'track'];
    // At low zoom, also skip minor roads
    const skipMinor = zoom < 13;
    // At very low zoom, skip tertiary too
    const skipTertiary = zoom < 11;

    const segments = [];
    for (const f of data.features) {
      const cls = (f.properties.road_class || '').toLowerCase();
      if (skipClasses.includes(cls)) continue;
      if (skipMinor && !major[cls]) continue;
      if (skipTertiary && !['motorway', 'trunk', 'primary'].includes(cls)) continue;

      const coords = f.geometry.coordinates.map(c => [c[1], c[0]]);
      const color = major[cls] || minor[cls] || '#666688';
      const weight = major[cls] ? 2.5 : 1.5;
      segments.push(L.polyline(coords, { color, weight, opacity: 0.6 }));
    }

    roadsLayer = L.layerGroup(segments).addTo(map);
  } catch(e) {
    showError('Roads fetch failed');
  }
}

// --- Buildings layer ---
function toggleBuildingsLayer() {
  const btn = document.getElementById('btn-buildings');
  buildingsVisible = !buildingsVisible;
  if (buildingsVisible) {
    btn.textContent = 'Hide Buildings';
    btn.classList.add('active');
    loadBuildingsForViewport();
    map.on('moveend', onMapMoveEndBuildings);
  } else {
    btn.textContent = 'Show Buildings';
    btn.classList.remove('active');
    map.off('moveend', onMapMoveEndBuildings);
    if (buildingsLayer) { map.removeLayer(buildingsLayer); buildingsLayer = null; }
  }
}

function onMapMoveEndBuildings() {
  if (buildingsTimer) clearTimeout(buildingsTimer);
  buildingsTimer = setTimeout(loadBuildingsForViewport, 300);
}

async function loadBuildingsForViewport() {
  if (!buildingsVisible) return;
  const b = map.getBounds();
  const minLat = b.getSouth(), minLon = b.getWest();
  const maxLat = b.getNorth(), maxLon = b.getEast();
  const spanLat = maxLat - minLat;
  const spanLon = maxLon - minLon;
  if (spanLat > 0.05 || spanLon > 0.05) return; // only load when zoomed in

  try {
    const res = await fetch(`/api/buildings-bounds?min_lat=${minLat}&min_lon=${minLon}&max_lat=${maxLat}&max_lon=${maxLon}`);
    const data = await res.json();
    if (data.error) { showError('Buildings: ' + data.error); return; }
    if (!data.features) return;

    if (buildingsLayer) map.removeLayer(buildingsLayer);

    const polys = [];
    for (const f of data.features) {
      const ring = f.geometry.coordinates[0].map(c => [c[1], c[0]]);
      const name = f.properties.name || '';
      const type = f.properties.building_type || '';
      const poly = L.polygon(ring, { color: '#ffaa44', weight: 1, opacity: 0.7, fillOpacity: 0.2 });
      if (name) poly.bindPopup(`<b>${name}</b><br>${type}`);
      polys.push(poly);
    }
    buildingsLayer = L.layerGroup(polys).addTo(map);
  } catch(e) {
    showError('Buildings fetch failed');
  }
}

// --- Routing ---
async function route() {
  const origin = parseLatLon(document.getElementById('origin-input').value);
  const dest = parseLatLon(document.getElementById('dest-input').value);
  if (!origin || !dest) { showError('Invalid coordinates'); return; }

  // Clear old routes
  if (ptilesLayer) { map.removeLayer(ptilesLayer); ptilesLayer = null; }
  if (osrmLayer) { map.removeLayer(osrmLayer); osrmLayer = null; }
  if (searchMarker) { map.removeLayer(searchMarker); searchMarker = null; }

  // Mark points
  L.circleMarker([origin[0], origin[1]], { color: '#00ff88', radius: 6 }).addTo(map);
  L.circleMarker([dest[0], dest[1]], { color: '#ff4488', radius: 6 }).addTo(map);
  map.fitBounds([[origin[0], origin[1]], [dest[0], dest[1]]], { padding: [50, 50] });

  // Query both
  const profile = document.getElementById('profile-select').value;
  const [ptilesRes, osrmRes] = await Promise.all([
    fetch(`/api/route?lat1=${origin[0]}&lon1=${origin[1]}&lat2=${dest[0]}&lon2=${dest[1]}&profile=${profile}`).then(r => r.json()),
    fetch(`/api/route-osrm?lat1=${origin[0]}&lon1=${origin[1]}&lat2=${dest[0]}&lon2=${dest[1]}`).then(r => r.json()),
  ]);

  if (ptilesRes.error) { showError('ptiles: ' + ptilesRes.error); }
  if (osrmRes.error) { showError('OSRM: ' + osrmRes.error); }

  ptilesLayer = drawRoute(ptilesRes, '#e94560', 'ptiles');
  osrmLayer = drawRoute(osrmRes, '#4488ff', 'OSRM');

  updateStats(ptilesRes, osrmRes);
}

async function randomRoute() {
  const res = await fetch('/api/random-route');
  const data = await res.json();
  if (data.origin && data.dest) {
    document.getElementById('origin-input').value = `${data.origin.lat.toFixed(4)},${data.origin.lon.toFixed(4)}`;
    document.getElementById('dest-input').value = `${data.dest.lat.toFixed(4)},${data.dest.lon.toFixed(4)}`;
    route();
  }
}

function toggleAutoRandom() {
  const checked = document.getElementById('auto-random').checked;
  if (checked) {
    autoTimer = setInterval(randomRoute, 3000);
    randomRoute();
  } else {
    clearInterval(autoTimer);
    autoTimer = null;
  }
}

// Click to set origin
map.on('click', async (e) => {
  const { lat, lng } = e.latlng;
  document.getElementById('origin-input').value = `${lat.toFixed(4)},${lng.toFixed(4)}`;

  // Query buildings
  try {
    const res = await fetch(`/api/buildings?lat=${lat}&lon=${lng}&radius=0.005`);
    const data = await res.json();
    if (data.buildings && data.buildings.length > 0) {
      L.popup()
        .setLatLng([lat, lng])
        .setContent(`<div class="building-popup"><strong>${data.buildings.length}</strong> buildings nearby</div>`)
        .openOn(map);
    }
  } catch(e) {}
});

// Initial route
route();
</script>
</body>
</html>
